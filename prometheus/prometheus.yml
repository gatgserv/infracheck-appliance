global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: infracheck-agent
    static_configs:
      - targets:
          - 127.0.0.1:8080

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9115
